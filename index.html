<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Depika | A Midnight Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Orbitron:wght@600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2a;
            --gold: #d4af37;
            --text-muted: #808696;
            --white-glass: rgba(255, 255, 255, 0.05);
        }

        body {
            margin: 0;
            background-color: var(--bg);
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
            height: 100vh;
        }

        /* --- Celestial Background --- */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; animation: twinkle 3s infinite; }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.8; } }

        /* --- Section Management --- */
        .page-section {
            position: absolute;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.8s cubic-bezier(0.86, 0, 0.07, 1);
            visibility: hidden;
        }
        .active { visibility: visible; }

        /* --- THE NETLIFY STYLE CARD --- */
        .card {
            background-color: var(--card-bg);
            padding: 3.5rem 2rem;
            border-radius: 60px;
            text-align: center;
            width: 88%;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            letter-spacing: 12px;
            color: #f2e1ac;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* --- Timer Row --- */
        .timer-row { display: flex; justify-content: space-around; margin: 50px 0; }
        .time-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            display: block;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }
        .time-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            display: block;
        }

        /* --- Buttons --- */
        .btn-gold {
            background: var(--gold); color: black; border: none; padding: 18px 45px;
            border-radius: 50px; font-weight: 700; cursor: pointer; margin-top: 20px;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3); transition: 0.3s;
            text-transform: uppercase; letter-spacing: 2px;
        }
        #reveal-btn { display: none; }
        .btn-outline { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 12px 25px; border-radius: 50px; margin-top: 30px; cursor: pointer; }

        /* --- Memory Gallery --- */
        #memory-section { transform: translateX(100%); display: block; overflow-y: auto; padding: 40px 0; background: var(--bg); }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
            padding: 20px;
            width: 90%;
            max-width: 800px;
            margin: 0 auto;
        }
        .photo-frame {
            background: var(--white-glass);
            border-radius: 20px;
            overflow: hidden;
            aspect-ratio: 1/1;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .photo-frame img { width: 100%; height: 100%; object-fit: cover; }

        /* --- Balloons --- */
        .balloon { position: absolute; bottom: -150px; width: 45px; height: 60px; border-radius: 50%; animation: floatUp 15s infinite linear; z-index: -1; }
        @keyframes floatUp { from { transform: translateY(0); } to { transform: translateY(-130vh); } }

    </style>
</head>
<body>

    <div id="starfield"></div>

    <div id="countdown-section" class="page-section active">
        <div class="card">
            <h1 class="name">DEPIKA</h1>
            <div class="subtitle">SPECIAL MOMENT IN:</div>

            <div class="timer-row">
                <div class="timer-box"><span id="h" class="time-val">00</span><span class="time-label">HOURS</span></div>
                <div class="timer-box"><span id="m" class="time-val">00</span><span class="time-label">MINS</span></div>
                <div class="timer-box"><span id="s" class="time-val">00</span><span class="time-label">SECS</span></div>
            </div>

            <p id="wait-msg" style="color: #4a5162; font-style: italic;">Preparation in progress...</p>
            <button id="reveal-btn" class="btn-gold" onclick="showSurprise()">Unlock Surprise ✨</button>
        </div>
    </div>

    <div id="wish-section" class="page-section">
        <div class="card">
            <h1 class="name" style="font-size: 2rem; letter-spacing: 5px;">HBD DEPIKA</h1>
            <div style="font-size: 60px; margin: 20px 0;">🎁</div>
            <p style="line-height: 1.6; color: #ced4e1;">To the most incredible person. Wishing you a day as brilliant as the stars.</p>
            <button class="btn-gold" onclick="showMemories()">Our Memories ✨</button>
        </div>
    </div>

    <div id="memory-section" class="page-section">
        <div style="text-align: center; width: 100%;">
            <h2 style="font-family: 'Playfair Display'; font-size: 2.5rem; color: #f2e1ac;">The Memory Vault</h2>
            <div class="gallery-grid" id="photo-gallery"></div>
            <button class="btn-outline" onclick="location.reload()">Return Home</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script>
        // 1. Check persistent state
        if (localStorage.getItem('depika_unlocked') === 'true') {
            bypassToSurprise();
        }

        // 2. Stars
        const starfield = document.getElementById('starfield');
        for(let i=0; i<70; i++){
            let s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 2 + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            starfield.appendChild(s);
        }

        // 3. Timer Logic
        function update() {
            if (localStorage.getItem('depika_unlocked') === 'true') return;
            const now = new Date();
            const target = new Date();
            target.setHours(24, 0, 0, 0); 
            const diff = 0;

            if (diff <= 0) {
                document.getElementById('wait-msg').style.display = 'none';
                document.getElementById('reveal-btn').style.display = 'inline-block';
                return;
            }

            document.getElementById('h').innerText = Math.floor((diff/36e5)%24).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff/6e4)%60).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff/1e3)%60).toString().padStart(2,'0');
        }
        setInterval(update, 1000);
        update();

        // 4. Memory Gallery Generator (Matches your 1.JPg to 15.JPg)
        const gallery = document.getElementById('photo-gallery');
        for (let i = 1; i <= 15; i++) {
            const frame = document.createElement('div');
            frame.className = 'photo-frame';
            const img = document.createElement('img');
            img.src = i + '.JPg'; 
            img.onerror = function() { this.parentElement.style.display = 'none'; };
            frame.appendChild(img);
            gallery.appendChild(frame);
        }

        // 5. Navigation Functions
        function showSurprise() {
            localStorage.setItem('depika_unlocked', 'true');
            confetti({ particleCount: 200, spread: 80, origin: { y: 0.6 } });
            document.getElementById('countdown-section').style.transform = 'translateY(-100%)';
            document.getElementById('wish-section').style.visibility = 'visible';
            document.getElementById('wish-section').style.transform = 'translateY(0)';
            spawnBalloons();
        }

        function bypassToSurprise() {
            document.getElementById('countdown-section').style.display = 'none';
            document.getElementById('wish-section').style.visibility = 'visible';
            document.getElementById('wish-section').style.transform = 'translateY(0)';
            spawnBalloons();
        }

        function showMemories() {
            document.getElementById('wish-section').style.transform = 'translateX(-100%)';
            document.getElementById('memory-section').style.visibility = 'visible';
            document.getElementById('memory-section').style.transform = 'translateX(0)';
        }

        function spawnBalloons() {
            for(let i=0; i<15; i++) {
                let b = document.createElement('div');
                b.className = 'balloon';
                b.style.backgroundColor = i % 2 === 0 ? '#d4af37' : '#fff';
                b.style.left = Math.random() * 100 + 'vw';
                b.style.animationDelay = Math.random() * 5 + 's';
                document.body.appendChild(b);
            }
        }
    </script>
</body>
</html>
