<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Depika</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Orbitron:wght@600&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f1a;
            --card-bg: #161b2a;
            --gold: #d4af37;
            --text-muted: #808696;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        /* --- Background Stars --- */
        #starfield { position: fixed; inset: 0; z-index: -1; }
        .star { position: absolute; background: white; border-radius: 50%; opacity: 0.3; }

        /* --- The Main Card --- */
        .card {
            background-color: var(--card-bg);
            padding: 3.5rem 2rem;
            border-radius: 60px; /* Matching the deep round corners */
            text-align: center;
            width: 88%;
            max-width: 400px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 3.2rem;
            letter-spacing: 12px;
            color: #f2e1ac;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: var(--gold);
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: 400;
        }

        /* --- Timer Styling (Matching the screenshot) --- */
        .timer-row {
            display: flex;
            justify-content: space-around;
            margin: 50px 0;
        }

        .timer-box {
            text-align: center;
        }

        .time-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            display: block;
            color: #fff;
            /* The subtle glow from the screenshot */
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        .time-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            display: block;
        }

        .footer-msg {
            font-style: italic;
            color: #4a5162;
            font-size: 0.95rem;
            margin-top: 30px;
        }

        /* --- The Secret Button (Appears at midnight) --- */
        #reveal-btn {
            display: none;
            background: var(--gold);
            color: #000;
            border: none;
            padding: 16px 40px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
            margin-top: 20px;
        }

        /* Transitions */
        .page-section { transition: 0.8s ease-in-out; position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; visibility: hidden; }
        .active { visibility: visible; }
        #wish-section, #memory-section { transform: translateY(100%); }

    </style>
</head>
<body>

    <div id="starfield"></div>

    <div id="countdown-section" class="page-section active">
        <div class="card">
            <h1 class="name">DEPIKA</h1>
            <div class="subtitle">SPECIAL MOMENT IN:</div>

            <div class="timer-row">
                <div class="timer-box">
                    <span id="h" class="time-val">00</span>
                    <span class="time-label">HOURS</span>
                </div>
                <div class="timer-box">
                    <span id="m" class="time-val">00</span>
                    <span class="time-label">MINS</span>
                </div>
                <div class="timer-box">
                    <span id="s" class="time-val">00</span>
                    <span class="time-label">SECS</span>
                </div>
            </div>

            <p id="wait-msg" class="footer-msg">Preparation in progress...</p>
            <button id="reveal-btn" onclick="openGift()">UNLOCK SURPRISE ✨</button>
        </div>
    </div>

    <script>
        // Stars
        const stars = document.getElementById('starfield');
        for(let i=0; i<60; i++){
            let s = document.createElement('div');
            s.className = 'star';
            s.style.width = s.style.height = Math.random() * 2 + 'px';
            s.style.left = Math.random() * 100 + 'vw';
            s.style.top = Math.random() * 100 + 'vh';
            stars.appendChild(s);
        }

        // Logic
        function update() {
            if (localStorage.getItem('unlocked') === 'true') {
                // You can add a redirect or state change here if already unlocked
            }

            const now = new Date();
            const target = new Date();
            target.setHours(24, 0, 0, 0); 
            const diff = target - now;

            if (diff <= 0) {
                document.getElementById('wait-msg').style.display = 'none';
                document.getElementById('reveal-btn').style.display = 'inline-block';
                return;
            }

            document.getElementById('h').innerText = Math.floor((diff/36e5)%24).toString().padStart(2,'0');
            document.getElementById('m').innerText = Math.floor((diff/6e4)%60).toString().padStart(2,'0');
            document.getElementById('s').innerText = Math.floor((diff/1e3)%60).toString().padStart(2,'0');
        }
        setInterval(update, 1000);
        update();

        function openGift() {
            localStorage.setItem('unlocked', 'true');
            // Trigger your animations and show the wish/memories
            alert("Happy Birthday Depika!");
        }
    </script>
</body>
</html>
